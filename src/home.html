<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>451-suite</title>
    <link rel="icon" href="common/suite.svg" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --color-bg: #f5f5f4;
        --color-surface: #ffffff;
        --color-surface-2: #f0f0ef;
        --color-text-primary: #1a1a1a;
        --color-text-secondary: #555555;
        --color-text-muted: #999999;
        --color-border: #e2e2e0;
        --color-border-strong: #c8c8c5;
        --color-accent: #1a1a1a;
        --color-accent-subtle: #f0f0ef;
        --color-danger: #c0392b;
        --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.12);
        --radius-sm: 8px;
        --radius-md: 14px;
        --radius-lg: 22px;
        --t-fast: 0.15s ease;
      }

      body.dark {
        --color-bg: #111110;
        --color-surface: #1c1c1b;
        --color-surface-2: #242423;
        --color-text-primary: #f0f0ef;
        --color-text-secondary: #a0a09e;
        --color-text-muted: #606060;
        --color-border: #2e2e2c;
        --color-border-strong: #444442;
        --color-accent: #f0f0ef;
        --color-accent-subtle: #242423;
        --color-danger: #e05a4a;
        --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
        --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.5);
      }

      html {
        height: 100%;
      }

      body {
        height: 100%;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI",
          "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
        font-size: 15px;
        line-height: 1.7;
        color: var(--color-text-primary);
        background: var(--color-bg);
        -webkit-font-smoothing: antialiased;
        font-feature-settings: "pkna";
        transition:
          background var(--t-fast),
          color var(--t-fast);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      /* ── Auth screen ─────────────────────────────── */
      #auth-screen {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .auth-wrap {
        width: 100%;
        max-width: 400px;
      }

      .auth-brand {
        text-align: center;
        margin-bottom: 32px;
      }

      .auth-brand-mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
        background: var(--color-accent);
        color: var(--color-bg);
        border-radius: var(--radius-sm);
        font-weight: 700;
        font-size: 18px;
        margin-bottom: 12px;
      }

      .auth-brand h1 {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--color-text-primary);
      }

      .auth-brand p {
        font-size: 13px;
        color: var(--color-text-muted);
        margin-top: 4px;
      }

      .auth-card {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        padding: 36px 32px;
        box-shadow: var(--shadow-lg);
      }

      .auth-card h2 {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 24px;
        color: var(--color-text-primary);
      }

      .auth-error {
        padding: 10px 14px;
        background: rgba(192, 57, 43, 0.07);
        border: 1px solid rgba(192, 57, 43, 0.2);
        border-radius: var(--radius-sm);
        color: var(--color-danger);
        font-size: 13px;
        margin-bottom: 16px;
        display: none;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
        margin-bottom: 14px;
      }

      .form-label {
        font-size: 12px;
        font-weight: 600;
        color: var(--color-text-secondary);
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .form-input {
        padding: 10px 14px;
        border: 1.5px solid var(--color-border-strong);
        border-radius: var(--radius-sm);
        font-size: 15px;
        font-family: inherit;
        background: var(--color-surface-2);
        color: var(--color-text-primary);
        transition:
          border-color var(--t-fast),
          box-shadow var(--t-fast);
        width: 100%;
      }

      .form-input:focus {
        outline: none;
        border-color: var(--color-accent);
        box-shadow: 0 0 0 3px rgba(26, 26, 26, 0.08);
        background: var(--color-surface);
      }

      body.dark .form-input:focus {
        box-shadow: 0 0 0 3px rgba(240, 240, 239, 0.1);
      }

      .btn-primary {
        width: 100%;
        padding: 11px 18px;
        background: var(--color-accent);
        color: var(--color-bg);
        border: none;
        border-radius: var(--radius-sm);
        font-size: 15px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        margin-top: 6px;
        transition:
          opacity var(--t-fast),
          transform var(--t-fast);
      }

      .btn-primary:hover:not(:disabled) {
        opacity: 0.85;
      }

      .btn-primary:active:not(:disabled) {
        transform: scale(0.99);
      }

      .btn-primary:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .auth-toggle {
        text-align: center;
        margin-top: 20px;
        font-size: 13px;
        color: var(--color-text-muted);
      }

      .auth-toggle button {
        background: none;
        border: none;
        color: var(--color-text-secondary);
        font-size: 13px;
        font-family: inherit;
        cursor: pointer;
        font-weight: 600;
        text-decoration: underline;
        text-underline-offset: 3px;
        padding: 0 2px;
      }

      .auth-toggle button:hover {
        color: var(--color-text-primary);
      }

      /* ── App screen ──────────────────────────────── */
      #app-screen {
        display: none;
        min-height: 100vh;
        flex-direction: column;
      }

      /* Header */
      .app-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        height: 56px;
        background: var(--color-surface);
        border-bottom: 1px solid var(--color-border);
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .header-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 700;
        font-size: 15px;
      }

      .header-brand-mark {
        width: 28px;
        height: 28px;
        background: var(--color-accent);
        color: var(--color-bg);
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 12px;
        flex-shrink: 0;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .user-email {
        font-size: 12px;
        color: var(--color-text-muted);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      .btn-ghost {
        padding: 6px 14px;
        background: transparent;
        border: 1.5px solid var(--color-border-strong);
        border-radius: var(--radius-sm);
        font-size: 13px;
        font-weight: 500;
        font-family: inherit;
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--t-fast);
      }

      .btn-ghost:hover {
        background: var(--color-surface-2);
        color: var(--color-text-primary);
      }

      .btn-icon-sm {
        width: 34px;
        height: 34px;
        background: transparent;
        border: 1.5px solid var(--color-border);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: var(--color-text-secondary);
        transition: all var(--t-fast);
        flex-shrink: 0;
      }

      .btn-icon-sm:hover {
        border-color: var(--color-border-strong);
        color: var(--color-text-primary);
      }

      /* Main content */
      .app-main {
        flex: 1;
        max-width: 900px;
        margin: 0 auto;
        width: 100%;
        padding: 48px 24px 64px;
      }

      .app-greeting {
        margin-bottom: 40px;
      }

      .app-greeting h2 {
        font-size: 26px;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--color-text-primary);
        margin-bottom: 6px;
      }

      .app-greeting p {
        font-size: 14px;
        color: var(--color-text-muted);
      }

      /* App cards */
      .app-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }

      .app-card {
        display: flex;
        flex-direction: column;
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        padding: 24px;
        box-shadow: var(--shadow-sm);
        transition:
          box-shadow var(--t-fast),
          transform var(--t-fast),
          border-color var(--t-fast);
        cursor: pointer;
        position: relative;
        overflow: hidden;
      }

      .app-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: var(--card-accent);
        opacity: 0;
        transition: opacity var(--t-fast);
      }

      .app-card:hover {
        box-shadow: var(--shadow-md);
        transform: translateY(-2px);
        border-color: var(--color-border-strong);
      }

      .app-card:hover::before {
        opacity: 1;
      }

      .card-icon {
        width: 40px;
        height: 40px;
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 16px;
        color: white;
        background: var(--card-accent);
        margin-bottom: 16px;
        flex-shrink: 0;
      }

      .card-title {
        font-size: 16px;
        font-weight: 700;
        color: var(--color-text-primary);
        margin-bottom: 8px;
        letter-spacing: -0.01em;
      }

      .card-desc {
        font-size: 13px;
        color: var(--color-text-secondary);
        line-height: 1.6;
        flex: 1;
      }

      .card-arrow {
        margin-top: 20px;
        font-size: 13px;
        font-weight: 600;
        color: var(--color-text-muted);
        display: flex;
        align-items: center;
        gap: 4px;
        transition:
          color var(--t-fast),
          gap var(--t-fast);
      }

      .app-card:hover .card-arrow {
        color: var(--color-text-primary);
        gap: 8px;
      }

      /* Loading state */
      .loading-overlay {
        position: fixed;
        inset: 0;
        background: var(--color-bg);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 200;
      }

      .spinner {
        width: 20px;
        height: 20px;
        border: 2px solid var(--color-border-strong);
        border-top-color: var(--color-accent);
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ── Responsive ──────────────────────────────── */
      @media (max-width: 700px) {
        .app-grid {
          grid-template-columns: 1fr;
        }

        .auth-card {
          padding: 28px 22px;
        }

        .app-main {
          padding: 32px 16px 48px;
        }

        .app-header {
          padding: 0 16px;
        }

        .user-email {
          display: none;
        }
      }

      @media (max-width: 480px) {
        .app-greeting h2 {
          font-size: 22px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Loading -->
    <div id="loading-overlay" class="loading-overlay">
      <div class="spinner"></div>
    </div>

    <!-- Auth screen -->
    <div id="auth-screen" style="display: none">
      <div class="auth-wrap">
        <div class="auth-brand">
          <div class="auth-brand-mark">4</div>
          <h1>451-suite</h1>
          <p>個人開発ツール集</p>
        </div>

        <div class="auth-card">
          <h2 id="auth-title">ログイン</h2>
          <div id="auth-error" class="auth-error"></div>

          <form id="auth-form">
            <div class="form-group">
              <label class="form-label" for="auth-email">メールアドレス</label>
              <input
                class="form-input"
                type="email"
                id="auth-email"
                required
                placeholder="your@email.com"
                autocomplete="email"
              />
            </div>
            <div class="form-group">
              <label class="form-label" for="auth-password">パスワード</label>
              <input
                class="form-input"
                type="password"
                id="auth-password"
                required
                placeholder="••••••••"
                autocomplete="current-password"
              />
            </div>
            <button type="submit" id="auth-submit" class="btn-primary">
              ログイン
            </button>
          </form>

          <div class="auth-toggle">
            <span id="auth-toggle-text">アカウントをお持ちでない場合は</span>
            <button type="button" id="auth-toggle-btn">新規登録</button>
          </div>
        </div>
      </div>
    </div>

    <!-- App screen -->
    <div id="app-screen">
      <header class="app-header">
        <div class="header-brand">
          <div class="header-brand-mark">4</div>
          451-suite
        </div>
        <div class="header-right">
          <span class="user-email" id="user-email"></span>
          <button class="btn-icon-sm" id="theme-toggle" aria-label="テーマ切替">
            <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor">
              <path
                d="M6 .278a.768.768 0 0 1 .08.858 7.208 7.208 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277.527 0 1.04-.055 1.533-.16a.787.787 0 0 1 .81.316.733.733 0 0 1-.031.893A8.349 8.349 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.752.752 0 0 1 6 .278z"
              />
            </svg>
          </button>
          <button class="btn-ghost" id="logout-btn">ログアウト</button>
        </div>
      </header>

      <main class="app-main">
        <div class="app-greeting">
          <h2>おかえり、<span id="greeting-name"></span></h2>
          <p>どのアプリを使う？</p>
        </div>

        <div class="app-grid">
          <a
            class="app-card"
            href="calendar/home.html"
            style="--card-accent: #bd5d38"
          >
            <div class="card-icon" style="background: #bd5d38">C</div>
            <div class="card-title">451-calendar</div>
            <div class="card-desc">
              課題・試験・授業を一括管理する学生向けカレンダー。時間割・ダッシュボード・クラウド同期対応。
            </div>
            <div class="card-arrow">Open <span>→</span></div>
          </a>

          <a
            class="app-card"
            href="schedule-tracker/home.html"
            style="--card-accent: #2d6a5f"
          >
            <div class="card-icon" style="background: #2d6a5f">S</div>
            <div class="card-title">Schedule</div>
            <div class="card-desc">
              曜日ごとの予定と24時間ドーナツチャート。リアルタイム時計と通知で今の予定を常に確認。
            </div>
            <div class="card-arrow">Open <span>→</span></div>
          </a>

          <a
            class="app-card"
            href="toshin-tracker/home.html"
            style="--card-accent: #3659a7"
          >
            <div class="card-icon" style="background: #3659a7">T</div>
            <div class="card-title">東進受講トラッカー</div>
            <div class="card-desc">
              コマ進捗・高速基礎マスター・模試カレンダーをひとまとめに管理するトラッカー。
            </div>
            <div class="card-arrow">Open <span>→</span></div>
          </a>
        </div>
      </main>
    </div>

    <script type="module">
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

      const SUPABASE_URL = "https://abfuanjincelcyrlswsp.supabase.co";
      const SUPABASE_KEY = "sb_publishable_uZuTU24T38xW7iAsXJIQ-g_OfuLjyjJ";
      const db = createClient(SUPABASE_URL, SUPABASE_KEY);

      // ── Elements ──────────────────────────────────
      const loadingEl = document.getElementById("loading-overlay");
      const authScreen = document.getElementById("auth-screen");
      const appScreen = document.getElementById("app-screen");
      const authForm = document.getElementById("auth-form");
      const authError = document.getElementById("auth-error");
      const authSubmit = document.getElementById("auth-submit");
      const authTitle = document.getElementById("auth-title");
      const toggleBtn = document.getElementById("auth-toggle-btn");
      const toggleText = document.getElementById("auth-toggle-text");
      const logoutBtn = document.getElementById("logout-btn");
      const userEmailEl = document.getElementById("user-email");
      const greetingEl = document.getElementById("greeting-name");

      let mode = "login";

      // ── UI helpers ────────────────────────────────
      function showAuth() {
        loadingEl.style.display = "none";
        authScreen.style.display = "flex";
        appScreen.style.display = "none";
      }

      function showApp(user) {
        loadingEl.style.display = "none";
        authScreen.style.display = "none";
        appScreen.style.display = "flex";
        const email = user.email || "";
        userEmailEl.textContent = email;
        // greeting: use part before @ as name
        const name = email.split("@")[0];
        greetingEl.textContent = name;
      }

      function showError(msg) {
        authError.textContent = msg;
        authError.style.display = "block";
      }

      function clearError() {
        authError.style.display = "none";
        authError.textContent = "";
      }

      // ── Auth mode toggle ──────────────────────────
      toggleBtn.addEventListener("click", () => {
        mode = mode === "login" ? "signup" : "login";
        if (mode === "signup") {
          authTitle.textContent = "新規登録";
          authSubmit.textContent = "登録する";
          toggleBtn.textContent = "ログイン";
          toggleText.textContent = "すでにアカウントをお持ちの場合は";
        } else {
          authTitle.textContent = "ログイン";
          authSubmit.textContent = "ログイン";
          toggleBtn.textContent = "新規登録";
          toggleText.textContent = "アカウントをお持ちでない場合は";
        }
        clearError();
      });

      // ── Auth form submit ──────────────────────────
      authForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        clearError();
        authSubmit.disabled = true;
        authSubmit.textContent =
          mode === "login" ? "ログイン中..." : "登録中...";

        const email = document.getElementById("auth-email").value.trim();
        const password = document.getElementById("auth-password").value;

        try {
          if (mode === "signup") {
            const { error } = await db.auth.signUp({ email, password });
            if (error) throw error;
            authError.style.background = "rgba(0,100,80,0.07)";
            authError.style.borderColor = "rgba(0,100,80,0.2)";
            authError.style.color = "#2d6a5f";
            showError(
              "確認メールを送信しました。メールを確認後ログインしてください。",
            );
            authForm.reset();
          } else {
            const { data, error } = await db.auth.signInWithPassword({
              email,
              password,
            });
            if (error) throw error;
            showApp(data.user);
          }
        } catch (err) {
          authError.style.background = "";
          authError.style.borderColor = "";
          authError.style.color = "";
          showError(err.message);
        } finally {
          authSubmit.disabled = false;
          authSubmit.textContent = mode === "login" ? "ログイン" : "登録する";
        }
      });

      // ── Logout ────────────────────────────────────
      logoutBtn.addEventListener("click", async () => {
        if (!confirm("ログアウトしますか？")) return;
        await db.auth.signOut();
        showAuth();
      });

      // ── Theme toggle ──────────────────────────────
      const themeToggle = document.getElementById("theme-toggle");
      const moonSvg = `<svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor"><path d="M6 .278a.768.768 0 0 1 .08.858 7.208 7.208 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277.527 0 1.04-.055 1.533-.16a.787.787 0 0 1 .81.316.733.733 0 0 1-.031.893A8.349 8.349 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.752.752 0 0 1 6 .278z"/></svg>`;
      const sunSvg = `<svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor"><path d="M8 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm0 1a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0zm0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13zm8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5zM3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8zm10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0zm-9.193 9.193a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0zm9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707zM4.464 4.465a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .708z"/></svg>`;

      function applyTheme(isDark) {
        document.body.classList.toggle("dark", isDark);
        themeToggle.innerHTML = isDark ? sunSvg : moonSvg;
      }

      const savedTheme = localStorage.getItem("theme");
      const prefersDark = matchMedia("(prefers-color-scheme: dark)").matches;
      applyTheme(savedTheme === "dark" || (!savedTheme && prefersDark));

      themeToggle.addEventListener("click", () => {
        const isDark = document.body.classList.toggle("dark");
        localStorage.setItem("theme", isDark ? "dark" : "light");
        themeToggle.innerHTML = isDark ? sunSvg : moonSvg;
      });

      // ── Session check on load ─────────────────────
      const {
        data: { session },
      } = await db.auth.getSession();
      if (session) {
        showApp(session.user);
      } else {
        showAuth();
      }

      // Auth state change (e.g. session expires)
      db.auth.onAuthStateChange((_event, session) => {
        if (!session) showAuth();
      });
    </script>
  </body>
</html>
