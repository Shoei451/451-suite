<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mini Calendar for Students - Shoei451</title>
    <link rel="icon" href="favicon/calendar-favicon.png" />
    <link rel="icon" href="favicon/calendar-favicon.svg" />
    <meta
      name="description"
      content="学生のためのシンプルで使いやすいカレンダーアプリ。課題、試験、授業などを一括管理し、デバイス間で同期できます。"
    />
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/timetable.css" />
    <link rel="stylesheet" href="css/print.css" />
    <style>
      /* ── 繰り返し曜日ボタン ── */
      .repeat-days {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-top: 8px;
      }
      .repeat-day-btn {
        width: 36px;
        height: 36px;
        min-height: 36px;
        padding: 0;
        border-radius: 50%;
        font-size: 12px;
        font-weight: 700;
        border: 1.5px solid var(--color-border-strong);
        background: var(--color-surface-2);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all 0.15s;
        box-shadow: none;
      }
      .repeat-day-btn:hover {
        border-color: var(--color-accent);
        color: var(--color-accent);
        transform: none;
        box-shadow: none;
      }
      .repeat-day-btn.active {
        background: var(--color-text-primary);
        color: var(--color-accent-light);
        border-color: var(--color-text-primary);
      }
      .repeat-day-btn.sat {
        color: var(--color-blue);
      }
      .repeat-day-btn.sat.active {
        background: var(--color-blue);
        color: #fff;
        border-color: var(--color-blue);
      }
      .repeat-day-btn.sun {
        color: var(--color-danger);
      }
      .repeat-day-btn.sun.active {
        background: var(--color-danger);
        color: #fff;
        border-color: var(--color-danger);
      }

      /* ── 繰り返しスコープダイアログ ── */
      #repeatScopeDialog {
        width: min(360px, 92vw);
        padding: 28px 24px;
      }
      #repeatScopeDialog:not([open]) {
        display: none;
      }
      #repeatScopeDialog::backdrop {
        background: rgba(10, 16, 24, 0.55);
        backdrop-filter: blur(8px);
      }
      #repeatScopeDialog h3 {
        font-size: 18px;
        margin-bottom: 18px;
        color: var(--color-text-primary);
      }
      .scope-btns {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .scope-btns button {
        justify-content: flex-start;
        text-align: left;
        padding: 13px 16px;
        font-size: 14px;
      }
      .scope-cancel {
        margin-top: 14px;
        width: 100%;
        background: transparent;
        border-color: var(--color-border-strong);
        color: var(--color-text-tertiary);
      }
    </style>
  </head>

  <body>
    <!-- ===================== メインアプリ ===================== -->
    <div class="app" id="mainApp">
      <!-- ── ヘッダー ── -->
      <header>
        <div class="brand">
          <div class="logo">
            <i class="bi bi-calendar3"></i>
          </div>
          <div class="brand-title">
            学生用カレンダー
            <span class="hint">課題 / 試験 / 授業を一括管理</span>
          </div>
        </div>

        <div class="header-right">
          <div class="user-info" id="userInfoBox" style="display: none">
            <i class="bi bi-person"></i>
            <span id="userEmail"></span>
          </div>
          <div class="sync-status" id="syncStatus">
            <i class="bi bi-cloud-check"></i>
            <span id="syncText">ローカルのみ</span>
          </div>
          <button id="theme-toggle" title="テーマ切替" aria-label="テーマ切替">
            <i class="bi bi-moon"></i>
          </button>
          <button id="logoutBtn" class="ghost" style="display: none">
            <i class="bi bi-box-arrow-right"></i>
            Log out
          </button>
        </div>
      </header>

      <!-- ── デスクトップ タブバー ── -->
      <nav class="tab-bar-desktop" aria-label="メインナビゲーション">
        <button class="tab-btn active" data-tab="calendar" aria-selected="true">
          <i class="bi bi-calendar3"></i> Calendar
        </button>
        <button class="tab-btn" data-tab="dashboard" aria-selected="false">
          <i class="bi bi-bar-chart-line"></i> Dashboard
        </button>
        <button class="tab-btn" data-tab="timetable" aria-selected="false">
          <i class="bi bi-grid"></i> Timetable
        </button>
        <button class="tab-btn" data-tab="settings" aria-selected="false">
          <i class="bi bi-gear"></i> Settings
        </button>
      </nav>

      <!-- ── 月ナビゲーション（カレンダービューのみ表示） ── -->
      <div id="calendarNav" role="navigation" aria-label="月の移動" hidden>
        <button id="prevBtn" title="前の月" aria-label="前の月">
          <i class="bi bi-chevron-left"></i>
        </button>
        <div class="month-nav-label-wrap">
          <span
            id="monthLabel"
            title="クリックで今月に戻る"
            role="button"
            tabindex="0"
          ></span>
        </div>
        <button id="nextBtn" title="次の月" aria-label="次の月">
          <i class="bi bi-chevron-right"></i>
        </button>
      </div>

      <!-- ===================== タブパネル ===================== -->

      <!-- カレンダー -->
      <section
        class="tab-panel active"
        id="panel-calendar"
        data-panel="calendar"
      >
        <div class="calendar-wrap">
          <div id="calendar" class="calendar" aria-label="カレンダー"></div>
        </div>
      </section>

      <!-- ダッシュボード -->
      <section
        class="tab-panel"
        id="panel-dashboard"
        data-panel="dashboard"
        hidden
      >
        <div class="dash-grid">
          <div class="panel">
            <div class="panel-body">
              <div
                class="flex"
                style="margin-bottom: 16px; gap: 8px; flex-wrap: wrap"
              >
                <select id="filterCourse">
                  <option value="">すべての科目</option>
                </select>
                <select id="filterType">
                  <option value="">すべての種類</option>
                  <option>時程変更</option>
                  <option>課題提出日</option>
                  <option>試験</option>
                  <option>定期試験 / 学校模試</option>
                  <option>東進模試</option>
                  <option>部活動</option>
                  <option>長期休み</option>
                  <option>その他</option>
                </select>
              </div>
              <div class="kpi">
                <div class="card">
                  <div class="lbl">今月の予定</div>
                  <div id="kpiTotal" class="num">0</div>
                </div>
                <div class="card">
                  <div class="lbl">全体の予定</div>
                  <div id="kpiAll" class="num">0</div>
                </div>
                <div class="card">
                  <div class="lbl">近日（7日）</div>
                  <div id="kpiSoon" class="num">0</div>
                </div>
              </div>
            </div>
          </div>
          <div class="panel">
            <div class="panel-body">
              <h3
                style="
                  margin-bottom: 12px;
                  font-size: 14px;
                  font-weight: 700;
                  color: var(--color-text-secondary);
                "
              >
                近日の予定
              </h3>
              <div id="upcoming" class="list"></div>
            </div>
          </div>
        </div>
      </section>

      <!-- 時間割 -->
      <section
        class="tab-panel"
        id="panel-timetable"
        data-panel="timetable"
        hidden
      >
        <div id="timetable-root"></div>
      </section>

      <!-- 設定 -->
      <section
        class="tab-panel"
        id="panel-settings"
        data-panel="settings"
        hidden
      >
        <div class="panel" style="max-width: 520px">
          <div
            class="panel-body"
            style="display: flex; flex-direction: column; gap: 20px"
          >
            <div>
              <h3
                style="
                  font-size: 13px;
                  font-weight: 700;
                  color: var(--color-text-tertiary);
                  text-transform: uppercase;
                  letter-spacing: 0.8px;
                  margin-bottom: 12px;
                "
              >
                時間割
              </h3>
              <label
                style="
                  display: flex;
                  align-items: center;
                  gap: 10px;
                  font-size: 14px;
                  cursor: pointer;
                "
              >
                <span style="color: var(--color-text-secondary)"
                  >1日の最大時限</span
                >
                <select
                  id="maxPeriodSelect"
                  style="width: auto; min-height: 36px"
                >
                  <option value="6">6時限</option>
                  <option value="7">7時限</option>
                </select>
              </label>
            </div>

            <div>
              <h3
                style="
                  font-size: 13px;
                  font-weight: 700;
                  color: var(--color-text-tertiary);
                  text-transform: uppercase;
                  letter-spacing: 0.8px;
                  margin-bottom: 12px;
                "
              >
                Data Management
              </h3>
              <div style="display: flex; flex-direction: column; gap: 8px">
                <button
                  id="exportBtn"
                  class="ghost"
                  style="justify-content: flex-start; gap: 8px"
                >
                  <i class="bi bi-download"></i> JSON export
                </button>
                <label class="ghost import-label" style="gap: 8px">
                  <i class="bi bi-upload"></i> JSON import
                  <input
                    type="file"
                    id="importFile"
                    accept="application/json"
                    hidden
                  />
                </label>
                <button
                  id="exportPdfBtn"
                  class="ghost"
                  style="justify-content: flex-start; gap: 8px"
                >
                  <i class="bi bi-file-earmark-pdf"></i> PDF Output (Print
                  currently selected month)
                </button>
              </div>
            </div>

            <div>
              <h3
                style="
                  font-size: 13px;
                  font-weight: 700;
                  color: var(--color-text-tertiary);
                  text-transform: uppercase;
                  letter-spacing: 0.8px;
                  margin-bottom: 12px;
                "
              >
                Danger Zone
              </h3>
              <button id="clearBtn" class="danger" style="gap: 8px">
                <i class="bi bi-trash3"></i> Delete All Data
              </button>
            </div>
          </div>
        </div>
      </section>
    </div>
    <!-- /.app -->

    <!-- ── モバイル ボトムタブバー ── -->
    <nav class="tab-bar-mobile" aria-label="メインナビゲーション">
      <div class="tab-bar-mobile-inner">
        <button class="tab-btn active" data-tab="calendar" aria-selected="true">
          <i class="bi bi-calendar3"></i>
          <span>Calendar</span>
        </button>
        <button class="tab-btn" data-tab="dashboard" aria-selected="false">
          <i class="bi bi-bar-chart-line"></i>
          <span>Dashboard</span>
        </button>
        <button class="tab-btn" data-tab="timetable" aria-selected="false">
          <i class="bi bi-grid"></i>
          <span>Time Table</span>
        </button>
        <button class="tab-btn" data-tab="settings" aria-selected="false">
          <i class="bi bi-gear"></i>
          <span>Settings</span>
        </button>
      </div>
    </nav>

    <!-- ===================== イベントモーダル ===================== -->
    <!-- ===================== イベントモーダル ===================== -->
    <dialog id="eventModal">
      <form method="dialog" id="eventForm">
        <div class="modal-head">
          <div class="modal-head-top">
            <div class="modal-head-left">
              <strong id="modalTitle">Add Event</strong>
              <div class="modal-steps" aria-label="入力ステップ">
                <span class="step-dot active" data-step="1"></span>
                <span class="step-dot" data-step="2"></span>
                <span class="step-dot" data-step="3"></span>
              </div>
            </div>
            <div class="modal-head-actions">
              <button
                id="deleteBtn"
                class="ghost modal-icon-btn"
                type="button"
                style="display: none"
                aria-label="削除"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="15"
                  height="15"
                  fill="currentColor"
                  viewBox="0 0 16 16"
                  aria-hidden="true"
                >
                  <path
                    d="M6.5 1h3a.5.5 0 0 1 .5.5v1H6v-1a.5.5 0 0 1 .5-.5ZM11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3A1.5 1.5 0 0 0 5 1.5v1H2.506a.58.58 0 0 0-.01 0H1.5a.5.5 0 0 0 0 1h.538l.853 10.66A2 2 0 0 0 4.885 16h6.23a2 2 0 0 0 1.994-1.84l.853-10.66h.538a.5.5 0 0 0 0-1h-.995a.59.59 0 0 0-.01 0H11Zm1.958 1-.846 10.58a1 1 0 0 1-.997.92h-6.23a1 1 0 0 1-.997-.92L3.042 3.5h9.916Zm-7.487 1a.5.5 0 0 1 .528.47l.5 8.5a.5.5 0 0 1-.998.06L5 5.03a.5.5 0 0 1 .47-.53Zm5.058 0a.5.5 0 0 1 .47.53l-.5 8.5a.5.5 0 1 1-.998-.06l.5-8.5a.5.5 0 0 1 .528-.47ZM8 4.5a.5.5 0 0 1 .5.5v8.5a.5.5 0 0 1-1 0V5a.5.5 0 0 1 .5-.5Z"
                  />
                </svg>
              </button>
              <button
                id="modalCloseBtn"
                class="ghost modal-icon-btn"
                type="button"
                aria-label="閉じる"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="15"
                  height="15"
                  fill="currentColor"
                  viewBox="0 0 16 16"
                  aria-hidden="true"
                >
                  <path
                    d="M2.146 2.854a.5.5 0 1 1 .708-.708L8 7.293l5.146-5.147a.5.5 0 0 1 .708.708L8.707 8l5.147 5.146a.5.5 0 0 1-.708.708L8 8.707l-5.146 5.147a.5.5 0 0 1-.708-.708L7.293 8 2.146 2.854Z"
                  />
                </svg>
              </button>
            </div>
          </div>
          <div class="modal-head-nav">
            <button
              id="modalBackBtn"
              class="ghost"
              type="button"
              style="display: none"
            >
              Back
            </button>
            <button id="modalNextBtn" class="primary" type="button">
              Next
            </button>
            <button
              id="saveBtn"
              class="primary"
              type="submit"
              style="display: none"
            >
              Save
            </button>
          </div>
        </div>

        <div class="modal-body">
          <input type="hidden" id="eventId" />
          <input type="hidden" id="groupId" />
          <input type="hidden" id="repeatGroupId" />
          <div id="groupWarning" style="display: none"></div>

          <!-- Step 1: タイトル + 種類 -->
          <div class="modal-step" id="step1">
            <div class="step-label">Step 1 / 3 — 基本情報</div>
            <div class="row" style="grid-template-columns: 1fr">
              <label
                >タイトル
                <input
                  id="title"
                  required
                  placeholder="例: 英語課題 Unit5 提出"
                />
              </label>
            </div>
            <div class="row" style="grid-template-columns: 1fr">
              <label
                >種類
                <select id="type">
                  <option>時程変更</option>
                  <option>課題提出日</option>
                  <option>試験</option>
                  <option>定期試験 / 学校模試</option>
                  <option>東進模試</option>
                  <option>部活動</option>
                  <option>長期休み</option>
                  <option>その他</option>
                </select>
              </label>
            </div>
          </div>

          <!-- Step 2: 日付 -->
          <div class="modal-step" id="step2" style="display: none">
            <div class="step-label">Step 2 / 3 — 日付</div>
            <div class="row">
              <label
                >日付
                <input id="date" type="date" required />
              </label>
              <label style="align-self: end; padding-bottom: 10px">
                <input
                  type="checkbox"
                  id="multiDate"
                  style="width: auto; margin-right: 8px"
                />
                複数日に登録
              </label>
            </div>
            <div class="row" id="endDateRow" style="display: none">
              <label
                >終了日（複数日登録時）<input id="endDate" type="date"
              /></label>
            </div>
            <div class="row" style="align-items: center; margin-top: 4px">
              <label
                style="
                  text-transform: none;
                  font-size: 13px;
                  font-weight: 600;
                  margin: 0;
                  display: flex;
                  align-items: center;
                  gap: 8px;
                  letter-spacing: 0;
                "
              >
                <input type="checkbox" id="repeatCheck" style="width: auto" />
                繰り返し登録
              </label>
            </div>
            <div id="repeatOptions" style="display: none; margin-bottom: 8px">
              <label
                style="
                  font-size: 11px;
                  font-weight: 700;
                  color: var(--color-text-tertiary);
                  text-transform: uppercase;
                  letter-spacing: 0.8px;
                "
              >
                繰り返す曜日
              </label>
              <div class="repeat-days" id="repeatDaysContainer"></div>
            </div>
            <div class="row" id="repeatEndDateRow" style="display: none">
              <label
                >繰り返し終了日<input id="repeatEndDate" type="date"
              /></label>
            </div>
            <div class="hint" id="multiDateHint" style="display: none">
              ✓ 開始日〜終了日の各日に個別の予定として登録されます
            </div>
          </div>

          <!-- Step 3: 科目 + 時刻 + メモ -->
          <div class="modal-step" id="step3" style="display: none">
            <div class="step-label">Step 3 / 3 — 詳細（任意）</div>
            <div
              class="row"
              style="grid-template-columns: 1fr"
              id="courseLabel"
            >
              <label
                >科目（任意）
                <input id="course" list="courseList" placeholder="例: 英語" />
                <datalist id="courseList"></datalist>
              </label>
            </div>
            <div class="row">
              <label>開始時刻（任意）<input id="start" type="time" /></label>
              <label>終了時刻（任意）<input id="end" type="time" /></label>
            </div>
            <div class="row" style="grid-template-columns: 1fr">
              <label
                >メモ
                <textarea
                  id="notes"
                  rows="3"
                  placeholder="持ち物・提出方法など"
                ></textarea>
              </label>
            </div>
          </div>
        </div>
      </form>
    </dialog>
    <!-- ===================== 繰り返し編集スコープダイアログ ===================== -->
    <dialog id="repeatScopeDialog">
      <h3>繰り返し予定の変更範囲</h3>
      <div class="scope-btns">
        <button
          type="button"
          class="ghost"
          onclick="
            document.getElementById('repeatScopeDialog').returnValue = 'this';
            document.getElementById('repeatScopeDialog').close();
          "
        >
          この予定のみ
        </button>
        <button
          type="button"
          class="ghost"
          onclick="
            document.getElementById('repeatScopeDialog').returnValue =
              'this_and_after';
            document.getElementById('repeatScopeDialog').close();
          "
        >
          この予定以降すべて
        </button>
        <button
          type="button"
          class="ghost"
          onclick="
            document.getElementById('repeatScopeDialog').returnValue = 'all';
            document.getElementById('repeatScopeDialog').close();
          "
        >
          すべての繰り返し予定
        </button>
      </div>
      <button
        type="button"
        class="scope-cancel ghost"
        onclick="
          document.getElementById('repeatScopeDialog').returnValue = '';
          document.getElementById('repeatScopeDialog').close();
        "
      >
        キャンセル
      </button>
    </dialog>

    <script type="module" src="js/app.js"></script>

    <!-- Dark mode: apply before render to avoid flash -->
    <script>
      const saved = localStorage.getItem("theme");
      const prefersDark = matchMedia("(prefers-color-scheme: dark)").matches;
      const isDarkInitial = saved === "dark" || (!saved && prefersDark);
      if (isDarkInitial) document.body.classList.add("dark");

      const toggleBtn = document.getElementById("theme-toggle");

      function updateToggleIcon(isDark) {
        const moonSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true"><path d="M6 .278a.768.768 0 0 1 .08.858 7.208 7.208 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277.527 0 1.04-.055 1.533-.16a.787.787 0 0 1 .81.316.733.733 0 0 1-.031.893A8.349 8.349 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.752.752 0 0 1 6 .278z"/></svg>`;
        const sunSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true"><path d="M8 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm0 1a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0zm0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13zm8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5zM3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8zm10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0zm-9.193 9.193a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0zm9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707zM4.464 4.465a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .708z"/></svg>`;
        toggleBtn.innerHTML = isDark ? sunSvg : moonSvg;
      }

      updateToggleIcon(isDarkInitial);

      toggleBtn?.addEventListener("click", () => {
        const isDark = document.body.classList.toggle("dark");
        localStorage.setItem("theme", isDark ? "dark" : "light");
        updateToggleIcon(isDark);
      });
    </script>
