<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WikiShelf</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --color-bg: #f5f5f3;
        --color-surface: #ffffff;
        --color-surface-raised: #ffffff;
        --color-sidebar: #eeede9;
        --color-text-primary: #1a1a1a;
        --color-text-secondary: #666660;
        --color-border: #e2e1dd;
        --color-accent: #4f6ef7;
        --color-accent-light: #eef0fe;
        --color-accent-hover: #3d5ce0;
        --color-on-accent: #ffffff;
        --color-hover: rgba(0, 0, 0, 0.04);
        --color-active: rgba(79, 110, 247, 0.1);
        --space-xs: 0.375rem;
        --space-sm: 0.75rem;
        --space-md: 1.25rem;
        --space-lg: 2rem;
        --radius-sm: 6px;
        --radius-md: 10px;
        --radius-lg: 14px;
        --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
        --sidebar-w: 240px;
        --topbar-h: 52px;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --color-bg: #111318;
          --color-surface: #1c1f27;
          --color-surface-raised: #242832;
          --color-sidebar: #161820;
          --color-text-primary: #eef0f4;
          --color-text-secondary: #8b90a0;
          --color-border: #2a2e3a;
          --color-accent: #6b8eff;
          --color-accent-light: #1a2352;
          --color-accent-hover: #8aa3ff;
          --color-on-accent: #ffffff;
          --color-hover: rgba(255, 255, 255, 0.05);
          --color-active: rgba(107, 142, 255, 0.15);
          --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
          --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
        }
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI",
          "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
        font-size: 0.9375rem;
        line-height: 1.6;
        color: var(--color-text-primary);
        background: var(--color-bg);
        -webkit-font-smoothing: antialiased;
        height: 100dvh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      /* ── Topbar ── */
      .topbar {
        height: var(--topbar-h);
        background: var(--color-surface);
        border-bottom: 1px solid var(--color-border);
        display: flex;
        align-items: center;
        padding: 0 var(--space-md);
        gap: var(--space-sm);
        flex-shrink: 0;
        z-index: 10;
      }

      .topbar-logo {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 700;
        font-size: 1rem;
        letter-spacing: -0.02em;
        color: var(--color-text-primary);
        text-decoration: none;
        width: calc(var(--sidebar-w) - var(--space-md) - 1px);
        flex-shrink: 0;
      }

      .logo-icon {
        width: 26px;
        height: 26px;
        background: var(--color-accent);
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--color-on-accent);
        font-size: 0.8rem;
        font-weight: 800;
      }

      .topbar-search {
        flex: 1;
        max-width: 480px;
        position: relative;
      }

      .topbar-search input {
        width: 100%;
        height: 34px;
        background: var(--color-bg);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        padding: 0 var(--space-sm) 0 2.2rem;
        font-size: 0.875rem;
        color: var(--color-text-primary);
        outline: none;
        transition: border-color 0.15s;
      }

      .topbar-search input::placeholder {
        color: var(--color-text-secondary);
      }
      .topbar-search input:focus {
        border-color: var(--color-accent);
      }

      .topbar-search .search-icon {
        position: absolute;
        left: 0.65rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--color-text-secondary);
        pointer-events: none;
        display: flex;
      }

      .topbar-actions {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: var(--space-xs);
      }

      .btn-icon {
        width: 34px;
        height: 34px;
        border: none;
        background: transparent;
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--color-text-secondary);
        cursor: pointer;
        transition:
          background 0.12s,
          color 0.12s;
      }

      .btn-icon:hover {
        background: var(--color-hover);
        color: var(--color-text-primary);
      }

      .btn-primary {
        height: 34px;
        padding: 0 var(--space-md);
        background: var(--color-accent);
        color: var(--color-on-accent);
        border: none;
        border-radius: var(--radius-sm);
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: background 0.12s;
      }

      .btn-primary:hover {
        background: var(--color-accent-hover);
      }

      /* ── Layout ── */
      .app-body {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      /* ── Sidebar ── */
      .sidebar {
        width: var(--sidebar-w);
        background: var(--color-sidebar);
        border-right: 1px solid var(--color-border);
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        flex-shrink: 0;
        padding: var(--space-sm) 0;
      }

      .sidebar::-webkit-scrollbar {
        width: 4px;
      }
      .sidebar::-webkit-scrollbar-thumb {
        background: var(--color-border);
        border-radius: 2px;
      }

      .sidebar-section {
        padding: 0 var(--space-xs);
        margin-bottom: var(--space-xs);
      }

      .sidebar-label {
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--color-text-secondary);
        padding: var(--space-xs) var(--space-sm);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .sidebar-label .label-action {
        width: 20px;
        height: 20px;
        border: none;
        background: transparent;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--color-text-secondary);
        cursor: pointer;
        opacity: 0;
        transition:
          opacity 0.12s,
          background 0.12s;
      }

      .sidebar-section:hover .label-action {
        opacity: 1;
      }
      .sidebar-label .label-action:hover {
        background: var(--color-hover);
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px var(--space-sm);
        border-radius: var(--radius-sm);
        cursor: pointer;
        color: var(--color-text-secondary);
        font-size: 0.875rem;
        transition:
          background 0.1s,
          color 0.1s;
        user-select: none;
      }

      .nav-item:hover {
        background: var(--color-hover);
        color: var(--color-text-primary);
      }

      .nav-item.active {
        background: var(--color-active);
        color: var(--color-accent);
        font-weight: 600;
      }

      .nav-item .nav-icon {
        width: 18px;
        height: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .nav-item .nav-count {
        margin-left: auto;
        font-size: 0.75rem;
        color: var(--color-text-secondary);
        font-variant-numeric: tabular-nums;
      }

      .collection-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
        margin-left: 3px;
        margin-right: 2px;
      }

      .sidebar-divider {
        height: 1px;
        background: var(--color-border);
        margin: var(--space-xs) var(--space-sm);
      }

      /* ── Main content ── */
      .main {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }

      .main::-webkit-scrollbar {
        width: 6px;
      }
      .main::-webkit-scrollbar-thumb {
        background: var(--color-border);
        border-radius: 3px;
      }

      .main-header {
        padding: var(--space-md) var(--space-lg);
        border-bottom: 1px solid var(--color-border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--color-surface);
        position: sticky;
        top: 0;
        z-index: 5;
      }

      .main-title {
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: -0.01em;
        display: flex;
        align-items: center;
        gap: var(--space-sm);
      }

      .main-title .count-badge {
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        background: var(--color-bg);
        border: 1px solid var(--color-border);
        padding: 1px 8px;
        border-radius: 20px;
        font-variant-numeric: tabular-nums;
      }

      .main-toolbar {
        display: flex;
        align-items: center;
        gap: var(--space-xs);
      }

      .sort-select {
        height: 32px;
        padding: 0 var(--space-sm);
        background: var(--color-bg);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-sm);
        font-size: 0.8125rem;
        color: var(--color-text-secondary);
        cursor: pointer;
        outline: none;
      }

      /* ── Card grid ── */
      .card-grid {
        padding: var(--space-md) var(--space-lg);
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: var(--space-md);
      }

      .article-card {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        overflow: hidden;
        cursor: pointer;
        transition:
          box-shadow 0.15s,
          transform 0.15s,
          border-color 0.15s;
        display: flex;
        flex-direction: column;
      }

      .article-card:hover {
        box-shadow: var(--shadow-md);
        transform: translateY(-1px);
        border-color: var(--color-accent);
      }

      .card-thumb {
        width: 100%;
        aspect-ratio: 16 / 7;
        object-fit: cover;
        background: var(--color-accent-light);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        color: var(--color-accent);
        flex-shrink: 0;
      }

      .card-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .card-body {
        padding: var(--space-sm) var(--space-md);
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .card-title {
        font-size: 0.9375rem;
        font-weight: 600;
        letter-spacing: -0.01em;
        line-height: 1.4;
        color: var(--color-text-primary);
      }

      .card-summary {
        font-size: 0.8125rem;
        color: var(--color-text-secondary);
        line-height: 1.55;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .card-footer {
        padding: var(--space-xs) var(--space-md);
        border-top: 1px solid var(--color-border);
        display: flex;
        align-items: center;
        gap: var(--space-xs);
        flex-wrap: wrap;
      }

      .tag {
        font-size: 0.7rem;
        font-weight: 500;
        padding: 2px 8px;
        border-radius: 20px;
        background: var(--color-accent-light);
        color: var(--color-accent);
        letter-spacing: 0.01em;
      }

      .card-meta {
        margin-left: auto;
        font-size: 0.72rem;
        color: var(--color-text-secondary);
        font-variant-numeric: tabular-nums;
      }

      /* ── Empty state ── */
      .empty-state {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: var(--space-md);
        color: var(--color-text-secondary);
        padding: var(--space-xl);
      }

      .empty-state .empty-icon {
        width: 56px;
        height: 56px;
        background: var(--color-accent-light);
        border-radius: var(--radius-lg);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--color-accent);
        font-size: 1.5rem;
      }

      .empty-state p {
        font-size: 0.9rem;
        text-align: center;
        max-width: 260px;
      }

      /* ── Modal ── */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(3px);
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.18s;
      }

      .modal-overlay.open {
        opacity: 1;
        pointer-events: all;
      }

      .modal {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        width: 480px;
        max-width: calc(100vw - 2rem);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        transform: translateY(8px);
        transition: transform 0.18s;
      }

      .modal-overlay.open .modal {
        transform: translateY(0);
      }

      .modal-header {
        padding: var(--space-md) var(--space-lg);
        border-bottom: 1px solid var(--color-border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .modal-header h2 {
        font-size: 0.9375rem;
        font-weight: 700;
      }

      .modal-body {
        padding: var(--space-lg);
        display: flex;
        flex-direction: column;
        gap: var(--space-md);
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .form-label {
        font-size: 0.8125rem;
        font-weight: 600;
        color: var(--color-text-secondary);
      }

      .form-input {
        height: 40px;
        background: var(--color-bg);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-sm);
        padding: 0 var(--space-sm);
        font-size: 0.9rem;
        color: var(--color-text-primary);
        outline: none;
        transition: border-color 0.15s;
      }

      .form-input:focus {
        border-color: var(--color-accent);
      }
      .form-input::placeholder {
        color: var(--color-text-secondary);
      }

      .preview-card {
        background: var(--color-bg);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        padding: var(--space-sm) var(--space-md);
        display: flex;
        gap: var(--space-sm);
        align-items: flex-start;
      }

      .preview-thumb {
        width: 48px;
        height: 48px;
        border-radius: var(--radius-sm);
        background: var(--color-accent-light);
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--color-accent);
        font-size: 1.2rem;
      }

      .preview-info .preview-title {
        font-size: 0.875rem;
        font-weight: 600;
        margin-bottom: 3px;
      }

      .preview-info .preview-desc {
        font-size: 0.775rem;
        color: var(--color-text-secondary);
        line-height: 1.5;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .modal-footer {
        padding: var(--space-md) var(--space-lg);
        border-top: 1px solid var(--color-border);
        display: flex;
        justify-content: flex-end;
        gap: var(--space-sm);
      }

      .btn-ghost {
        height: 36px;
        padding: 0 var(--space-md);
        background: transparent;
        border: 1px solid var(--color-border);
        border-radius: var(--radius-sm);
        font-size: 0.875rem;
        color: var(--color-text-secondary);
        cursor: pointer;
        transition:
          background 0.12s,
          color 0.12s;
      }

      .btn-ghost:hover {
        background: var(--color-hover);
        color: var(--color-text-primary);
      }

      /* ── Scrollbar ── */
      .main::-webkit-scrollbar {
        width: 6px;
      }
      .main::-webkit-scrollbar-thumb {
        background: var(--color-border);
        border-radius: 3px;
      }

      /* SVG icons inline */
      .icon {
        width: 16px;
        height: 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      svg {
        fill: currentColor;
      }
    </style>
  </head>
  <body>
    <!-- Topbar -->
    <header class="topbar">
      <a class="topbar-logo" href="#">
        <div class="logo-icon">W</div>
        WikiShelf
      </a>

      <div class="topbar-search">
        <span class="search-icon">
          <svg width="14" height="14" viewBox="0 0 16 16">
            <path
              d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"
            />
          </svg>
        </span>
        <input type="text" placeholder="記事を検索…" id="search-input" />
      </div>

      <div class="topbar-actions">
        <button class="btn-icon" title="グラフビュー">
          <svg width="16" height="16" viewBox="0 0 16 16">
            <path
              d="M6 2a4 4 0 1 1 0 8 4 4 0 0 1 0-8M2 6a4 4 0 1 0 8 0A4 4 0 0 0 2 6m9.93 1a3 3 0 1 0 0-2H12a6 6 0 0 1 0 2z"
            />
          </svg>
        </button>
        <button class="btn-icon" title="エクスポート">
          <svg width="16" height="16" viewBox="0 0 16 16">
            <path
              d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5"
            />
            <path
              d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708z"
            />
          </svg>
        </button>
        <button class="btn-primary" id="add-btn">
          <svg width="14" height="14" viewBox="0 0 16 16">
            <path
              d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2"
            />
          </svg>
          記事を追加
        </button>
      </div>
    </header>

    <!-- App body -->
    <div class="app-body">
      <!-- Sidebar -->
      <nav class="sidebar">
        <div class="sidebar-section">
          <div class="nav-item active" data-filter="all">
            <span class="nav-icon">
              <svg width="15" height="15" viewBox="0 0 16 16">
                <path
                  d="M1 2.5A1.5 1.5 0 0 1 2.5 1h3A1.5 1.5 0 0 1 7 2.5v3A1.5 1.5 0 0 1 5.5 7h-3A1.5 1.5 0 0 1 1 5.5zm8 0A1.5 1.5 0 0 1 10.5 1h3A1.5 1.5 0 0 1 15 2.5v3A1.5 1.5 0 0 1 13.5 7h-3A1.5 1.5 0 0 1 9 5.5zm-8 8A1.5 1.5 0 0 1 2.5 9h3A1.5 1.5 0 0 1 7 10.5v3A1.5 1.5 0 0 1 5.5 15h-3A1.5 1.5 0 0 1 1 13.5zm8 0A1.5 1.5 0 0 1 10.5 9h3A1.5 1.5 0 0 1 15 10.5v3A1.5 1.5 0 0 1 13.5 15h-3A1.5 1.5 0 0 1 9 13.5z"
                />
              </svg>
            </span>
            すべて
            <span class="nav-count">12</span>
          </div>
          <div class="nav-item" data-filter="unsorted">
            <span class="nav-icon">
              <svg width="15" height="15" viewBox="0 0 16 16">
                <path
                  d="M9.828.722a.5.5 0 0 1 .354.146l4.95 4.95a.5.5 0 0 1 0 .707c-.48.48-1.072.588-1.503.588-.177 0-.335-.018-.46-.039l-3.134 3.134a6 6 0 0 1 .16 1.013c.046.702-.032 1.687-.72 2.375a.5.5 0 0 1-.707 0l-2.829-2.828-3.182 3.182c-.195.195-1.219.902-1.414.707s.512-1.22.707-1.414l3.182-3.182-2.828-2.829a.5.5 0 0 1 0-.707c.688-.688 1.673-.767 2.375-.72a6 6 0 0 1 1.013.16l3.134-3.133a3 3 0 0 1-.04-.461c0-.43.108-1.022.589-1.503a.5.5 0 0 1 .353-.146"
                />
              </svg>
            </span>
            未分類
            <span class="nav-count">3</span>
          </div>
        </div>

        <div class="sidebar-divider"></div>

        <div class="sidebar-section">
          <div class="sidebar-label">
            コレクション
            <button class="label-action" title="コレクションを追加">
              <svg width="12" height="12" viewBox="0 0 16 16">
                <path
                  d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2"
                />
              </svg>
            </button>
          </div>
          <div class="nav-item" data-filter="col-history">
            <span class="collection-dot" style="background: #e05c5c"></span>
            近現代史

      // ── Render cards ──
      function renderCards(articles) {
        const grid = document.getElementById("card-grid");
        if (articles.length === 0) {
          grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1;">
          <div class="empty-icon">📂</div>
          <p>このコレクションにはまだ記事がありません</p>
          <button class="btn-primary" onclick="openModal()">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2"/></svg>
            記事を追加
          </button>
        </div>`;
          return;
        }

        grid.innerHTML = articles
          .map(
            (a) => `
      <div class="article-card">
        <div class="card-thumb">
          <span style="font-size:2.2rem;">${a.emoji}</span>
        </div>
        <div class="card-body">
          <div class="card-title">${a.title}</div>
          <div class="card-summary">${a.summary}</div>
        </div>
        <div class="card-footer">
          ${a.tags
            .slice(0, 2)
            .map((t) => `<span class="tag">${t}</span>`)
            .join("")}
          <span class="card-meta">${a.saved}</span>
        </div>
      </div>
    `,
          )
          .join("");
      }

      // ── Filter ──
      let activeFilter = "all";

      function applyFilter(filter) {
        activeFilter = filter;
        let result;
        if (filter === "all") result = ARTICLES;
        else if (filter === "unsorted")
          result = ARTICLES.filter((a) => !a.collection);
        else if (filter.startsWith("col-"))
          result = ARTICLES.filter((a) => a.collection === filter);
        else if (filter.startsWith("tag-")) {
          const tag = {
            "tag-wwii": "第二次世界大戦",
            "tag-europe": "ヨーロッパ",
            "tag-economics": "経済史",
          }[filter];
          result = ARTICLES.filter((a) => a.tags.includes(tag));
        } else result = ARTICLES;

        const labelMap = {
          all: "すべて",
          unsorted: "未分類",
          "col-history": "近現代史",
          "col-geo": "地理・地政学",
          "col-science": "科学・技術",
          "tag-wwii": "第二次世界大戦",
          "tag-europe": "ヨーロッパ",
          "tag-economics": "経済史",
        };

        document.querySelector(".main-title").innerHTML =
          `${labelMap[filter] || filter} <span class="count-badge">${result.length}件</span>`;

        // Search filter on top
        const q = document.getElementById("search-input").value.trim();
        if (q)
          result = result.filter(
            (a) => a.title.includes(q) || a.summary.includes(q),
          );

        renderCards(result);

        document.querySelectorAll(".nav-item").forEach((el) => {
          el.classList.toggle("active", el.dataset.filter === filter);
        });
      }

      document.querySelectorAll(".nav-item").forEach((el) => {
        el.addEventListener("click", () => applyFilter(el.dataset.filter));
      });

      document
        .getElementById("search-input")
        .addEventListener("input", () => applyFilter(activeFilter));

      // ── Modal ──
      function openModal() {
        document.getElementById("modal-overlay").classList.add("open");
        document.getElementById("url-input").focus();
      }

      function closeModal() {
        document.getElementById("modal-overlay").classList.remove("open");
        document.getElementById("url-input").value = "";
        document.getElementById("preview-card").style.display = "none";
      }

      document.getElementById("add-btn").addEventListener("click", openModal);
      document
        .getElementById("modal-close")
        .addEventListener("click", closeModal);
      document
        .getElementById("cancel-btn")
        .addEventListener("click", closeModal);
      document
        .getElementById("modal-overlay")
        .addEventListener("click", (e) => {
          if (e.target === e.currentTarget) closeModal();
        });

      // Mock preview on input
      let previewTimer;
      document.getElementById("url-input").addEventListener("input", (e) => {
        clearTimeout(previewTimer);
        const val = e.target.value.trim();
        if (!val) {
          document.getElementById("preview-card").style.display = "none";
          return;
        }
        previewTimer = setTimeout(() => {
          document.getElementById("preview-card").style.display = "flex";
          const title = val.includes("wikipedia.org/wiki/")
            ? decodeURIComponent(
                val.split("/wiki/")[1]?.replace(/_/g, " ") || val,
              )
            : val;
          document.getElementById("preview-title").textContent = title;
          document.getElementById("preview-desc").textContent =
            "Wikipedia APIから要約を取得中…（モック）";
        }, 400);
      });

      document.getElementById("save-btn").addEventListener("click", () => {
        const val = document.getElementById("url-input").value.trim();
        if (!val) return;
        alert("保存しました（モック）: " + val);
        closeModal();
      });

      // ── Init ──
      renderCards(ARTICLES);
