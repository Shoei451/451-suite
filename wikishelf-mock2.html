<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WikiShelf</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #f4f4f2;
      --color-surface: #ffffff;
      --color-sidebar: #f0efec;
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #636360;
      --color-border: #e0dedd;
      --color-accent: #1492d4;
      --color-accent-light: #e3f3fc;
      --color-accent-hover: #0f7ab8;
      --color-on-accent: #ffffff;
      --color-hover: rgba(0,0,0,0.045);
      --color-active-bg: rgba(20,146,212,0.10);
      --color-active-text: #1492d4;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.07);
      --shadow-md: 0 4px 20px rgba(0,0,0,0.10);
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --sidebar-w: 248px;
      --topbar-h: 50px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg: #0e1117;
        --color-surface: #181c25;
        --color-sidebar: #12161e;
        --color-text-primary: #edf0f5;
        --color-text-secondary: #8892a4;
        --color-border: #262d3a;
        --color-accent: #3aaee0;
        --color-accent-light: #0d2a3d;
        --color-accent-hover: #5cbfe8;
        --color-on-accent: #ffffff;
        --color-hover: rgba(255,255,255,0.05);
        --color-active-bg: rgba(58,174,224,0.14);
        --color-active-text: #3aaee0;
        --shadow-sm: 0 1px 4px rgba(0,0,0,0.35);
        --shadow-md: 0 6px 24px rgba(0,0,0,0.45);
      }
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
      font-size: 0.9375rem;
      line-height: 1.5;
      color: var(--color-text-primary);
      background: var(--color-bg);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ══════════════════════
       TOPBAR
    ══════════════════════ */
    .topbar {
      height: var(--topbar-h);
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      flex-shrink: 0;
      z-index: 30;
    }

    .topbar-logo {
      display: flex; align-items: center; gap: 7px;
      font-weight: 800; font-size: 0.975rem;
      letter-spacing: -0.02em;
      color: var(--color-text-primary);
      text-decoration: none; flex-shrink: 0;
    }

    .logo-mark {
      width: 24px; height: 24px;
      background: var(--color-accent);
      border-radius: 6px;
      display: grid; place-items: center;
      color: var(--color-on-accent);
      font-size: 0.68rem; font-weight: 900;
      letter-spacing: -0.04em;
    }

    /* Desktop-only search */
    .topbar-search {
      flex: 1; max-width: 400px; margin-left: 8px;
      position: relative; display: none;
    }
    .topbar-search input {
      width: 100%; height: 32px;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: 20px;
      padding: 0 12px 0 32px;
      font-size: 0.85rem; color: var(--color-text-primary);
      outline: none; transition: border-color 0.15s;
    }
    .topbar-search input::placeholder { color: var(--color-text-secondary); }
    .topbar-search input:focus { border-color: var(--color-accent); }
    .topbar-search .si {
      position: absolute; left: 10px; top: 50%;
      transform: translateY(-50%);
      color: var(--color-text-secondary);
      pointer-events: none; display: flex;
    }

    .topbar-spacer { flex: 1; }

    .topbar-actions { display: flex; align-items: center; gap: 4px; }

    .btn-icon {
      width: 34px; height: 34px; border: none;
      background: transparent; border-radius: var(--radius-sm);
      display: grid; place-items: center;
      color: var(--color-text-secondary);
      cursor: pointer; transition: background 0.12s, color 0.12s; flex-shrink: 0;
    }
    .btn-icon:hover { background: var(--color-hover); color: var(--color-text-primary); }

    .btn-add {
      height: 32px; padding: 0 14px;
      background: var(--color-accent); color: var(--color-on-accent);
      border: none; border-radius: var(--radius-sm);
      font-size: 0.85rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      transition: background 0.12s; flex-shrink: 0;
    }
    .btn-add:hover { background: var(--color-accent-hover); }

    /* ══════════════════════
       APP BODY
    ══════════════════════ */
    .app-body {
      display: flex; flex: 1; overflow: hidden; position: relative;
    }

    /* ══════════════════════
       SIDEBAR
    ══════════════════════ */
    .sidebar {
      width: 100%;
      background: var(--color-sidebar);
      border-right: 1px solid var(--color-border);
      display: flex; flex-direction: column;
      overflow-y: auto; flex-shrink: 0;
      z-index: 20;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 2px; }

    .sidebar-user {
      padding: 12px 14px 8px;
      display: flex; align-items: center; gap: 8px;
      font-size: 0.875rem; font-weight: 600; flex-shrink: 0;
    }
    .user-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--color-accent); color: var(--color-on-accent);
      display: grid; place-items: center;
      font-size: 0.75rem; font-weight: 700; flex-shrink: 0;
    }
    .user-caret { margin-left: auto; color: var(--color-text-secondary); display: flex; }

    /* Mobile search (inside sidebar) */
    .sidebar-search {
      padding: 4px 10px 6px; position: relative; flex-shrink: 0;
    }
    .sidebar-search input {
      width: 100%; height: 36px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 20px;
      padding: 0 12px 0 34px;
      font-size: 0.875rem; color: var(--color-text-primary);
      outline: none; transition: border-color 0.15s;
    }
    .sidebar-search input::placeholder { color: var(--color-text-secondary); }
    .sidebar-search input:focus { border-color: var(--color-accent); }
    .sidebar-search .si {
      position: absolute; left: 20px; top: 50%;
      transform: translateY(-50%);
      color: var(--color-text-secondary); pointer-events: none; display: flex;
    }

    .sidebar-section { padding: 2px 8px; }

    .section-label {
      font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--color-text-secondary);
      padding: 10px 8px 4px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .section-label-btn {
      width: 20px; height: 20px; border: none; background: transparent;
      border-radius: 4px; display: grid; place-items: center;
      color: var(--color-text-secondary); cursor: pointer;
      opacity: 0; transition: opacity 0.12s, background 0.12s;
    }
    .sidebar-section:hover .section-label-btn { opacity: 1; }
    .section-label-btn:hover { background: var(--color-hover); }

    .nav-item {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 10px; border-radius: var(--radius-sm);
      cursor: pointer; color: var(--color-text-secondary);
      font-size: 0.9rem; transition: background 0.1s, color 0.1s;
      user-select: none; min-height: 40px;
    }
    .nav-item:hover { background: var(--color-hover); color: var(--color-text-primary); }
    .nav-item.active { background: var(--color-active-bg); color: var(--color-active-text); font-weight: 600; }

    .nav-icon { width: 18px; height: 18px; display: grid; place-items: center; flex-shrink: 0; }
    .col-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-left: 2px; }
    .nav-count { margin-left: auto; font-size: 0.8rem; color: var(--color-text-secondary); font-variant-numeric: tabular-nums; }
    .nav-hash { font-size: 0.85rem; color: var(--color-text-secondary); flex-shrink: 0; width: 18px; text-align: center; line-height: 1; }

    .sidebar-divider { height: 1px; background: var(--color-border); margin: 4px 12px; }

    /* ══════════════════════
       MAIN PANEL
    ══════════════════════ */
    .main {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
      position: absolute; inset: 0;
      background: var(--color-bg);
      transform: translateX(100%);
      transition: transform 0.24s cubic-bezier(.4,0,.2,1);
      z-index: 10;
    }
    .main.visible { transform: translateX(0); }

    .main-topbar {
      height: var(--topbar-h);
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      display: flex; align-items: center;
      padding: 0 14px; gap: 8px; flex-shrink: 0;
    }

    .back-btn {
      display: flex; align-items: center; gap: 4px;
      border: none; background: transparent;
      color: var(--color-accent);
      font-size: 0.875rem; font-weight: 600;
      cursor: pointer; padding: 4px 6px 4px 0;
      flex-shrink: 0;
    }

    .main-title-row {
      display: flex; align-items: center; gap: 8px;
      flex: 1; min-width: 0;
    }
    .main-title {
      font-size: 1rem; font-weight: 700; letter-spacing: -0.01em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .count-badge {
      font-size: 0.72rem; font-weight: 500;
      color: var(--color-text-secondary);
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      padding: 1px 7px; border-radius: 20px;
      font-variant-numeric: tabular-nums; flex-shrink: 0;
    }

    .main-actions { display: flex; align-items: center; gap: 2px; margin-left: auto; }

    /* ── List ── */
    .article-list { flex: 1; overflow-y: auto; }
    .article-list::-webkit-scrollbar { width: 4px; }
    .article-list::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 2px; }

    .list-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 16px;
      border-bottom: 1px solid var(--color-border);
      cursor: pointer; transition: background 0.1s; min-height: 70px;
    }
    .list-item:last-child { border-bottom: none; }
    .list-item:hover { background: var(--color-hover); }
    .list-item:active { background: var(--color-active-bg); }

    .item-thumb {
      width: 50px; height: 50px; border-radius: var(--radius-sm);
      background: var(--color-accent-light);
      flex-shrink: 0; display: grid; place-items: center;
      font-size: 1.4rem; border: 1px solid var(--color-border);
      overflow: hidden;
    }

    .item-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }

    .item-title {
      font-size: 0.9375rem; font-weight: 600; line-height: 1.35;
      letter-spacing: -0.01em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .item-meta {
      font-size: 0.775rem; color: var(--color-text-secondary);
      display: flex; align-items: center; gap: 5px;
    }

    .item-tags { display: flex; gap: 4px; flex-wrap: wrap; }

    .tag-pill {
      font-size: 0.68rem; font-weight: 600; padding: 1px 7px;
      border-radius: 20px; background: var(--color-accent-light); color: var(--color-accent);
    }

    .item-actions {
      display: flex; align-items: center; gap: 2px;
      opacity: 0; transition: opacity 0.12s; flex-shrink: 0;
    }
    .list-item:hover .item-actions { opacity: 1; }

    /* ── Empty ── */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; color: var(--color-text-secondary); padding: 48px 24px;
    }
    .empty-icon {
      width: 54px; height: 54px; background: var(--color-accent-light);
      border-radius: var(--radius-lg); display: grid; place-items: center; font-size: 1.5rem;
    }
    .empty-state p { font-size: 0.875rem; text-align: center; max-width: 220px; line-height: 1.6; }

    /* ══════════════════════
       MODAL
    ══════════════════════ */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.48);
      backdrop-filter: blur(4px);
      z-index: 100; display: grid; place-items: center;
      padding: 16px; opacity: 0; pointer-events: none;
      transition: opacity 0.18s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      width: 100%; max-width: 460px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.25);
      transform: translateY(10px); transition: transform 0.18s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-header {
      padding: 16px 18px; border-bottom: 1px solid var(--color-border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-header h2 { font-size: 0.9375rem; font-weight: 700; }

    .modal-body { padding: 18px; display: flex; flex-direction: column; gap: 14px; }

    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-label { font-size: 0.8rem; font-weight: 600; color: var(--color-text-secondary); }

    .form-input {
      height: 42px; background: var(--color-bg);
      border: 1px solid var(--color-border); border-radius: var(--radius-sm);
      padding: 0 12px; font-size: 0.9rem; color: var(--color-text-primary);
      outline: none; transition: border-color 0.15s; width: 100%;
    }
    .form-input:focus { border-color: var(--color-accent); }
    .form-input::placeholder { color: var(--color-text-secondary); }

    .preview-block {
      background: var(--color-bg); border: 1px solid var(--color-border);
      border-radius: var(--radius-md); padding: 12px;
      display: flex; gap: 10px; align-items: flex-start;
    }
    .preview-thumb {
      width: 44px; height: 44px; border-radius: var(--radius-sm);
      background: var(--color-accent-light); display: grid;
      place-items: center; font-size: 1.2rem; flex-shrink: 0;
    }
    .preview-title { font-size: 0.875rem; font-weight: 600; margin-bottom: 3px; }
    .preview-desc {
      font-size: 0.775rem; color: var(--color-text-secondary); line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    .modal-footer {
      padding: 12px 18px; border-top: 1px solid var(--color-border);
      display: flex; justify-content: flex-end; gap: 8px;
    }
    .btn-ghost {
      height: 38px; padding: 0 16px; background: transparent;
      border: 1px solid var(--color-border); border-radius: var(--radius-sm);
      font-size: 0.875rem; color: var(--color-text-secondary);
      cursor: pointer; transition: background 0.12s;
    }
    .btn-ghost:hover { background: var(--color-hover); color: var(--color-text-primary); }

    .btn-primary {
      height: 38px; padding: 0 18px;
      background: var(--color-accent); color: var(--color-on-accent);
      border: none; border-radius: var(--radius-sm);
      font-size: 0.875rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      transition: background 0.12s;
    }
    .btn-primary:hover { background: var(--color-accent-hover); }

    /* ══════════════════════
       DESKTOP ≥700px
    ══════════════════════ */
    @media (min-width: 700px) {
      .sidebar {
        width: var(--sidebar-w);
        position: static;
      }
      .sidebar-search { display: none; }
      .topbar-search { display: block; }

      .main {
        position: static;
        transform: none !important;
      }
      .back-btn { display: none; }
    }

    svg { fill: currentColor; }
  </style>
</head>
<body>
<div class="app">

  <header class="topbar">
    <a class="topbar-logo" href="#">
      <div class="logo-mark">WS</div>
      WikiShelf
    </a>
    <div class="topbar-search">
      <span class="si"><svg width="13" height="13" viewBox="0 0 16 16"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/></svg></span>
      <input type="text" placeholder="記事を検索…" id="desktop-search" />
    </div>
    <div class="topbar-spacer"></div>
    <div class="topbar-actions">
      <button class="btn-icon" title="グラフビュー">
        <svg width="16" height="16" viewBox="0 0 16 16"><path d="M6 2a4 4 0 1 1 0 8 4 4 0 0 1 0-8M2 6a4 4 0 1 0 8 0A4 4 0 0 0 2 6m9.93 1a3 3 0 1 0 0-2H12a6 6 0 0 1 0 2z"/></svg>
      </button>
      <button class="btn-icon" title="エクスポート">
        <svg width="15" height="15" viewBox="0 0 16 16"><path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5"/><path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708z"/></svg>
      </button>
      <button class="btn-add" id="add-btn">
        <svg width="13" height="13" viewBox="0 0 16 16"><path d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2"/></svg>
        追加
      </button>
    </div>
  </header>

  <div class="app-body">

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-user">
        <div class="user-avatar">S</div>
        Shoei_Okamoto
        <span class="user-caret"><svg width="12" height="12" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M1.646 4.646a.5.5 0 0 1 .708 0L8 10.293l5.646-5.647a.5.5 0 0 1 .708.708l-6 6a.5.5 0 0 1-.708 0l-6-6a.5.5 0 0 1 0-.708"/></svg></span>
      </div>

      <div class="sidebar-search">
        <span class="si"><svg width="14" height="14" viewBox="0 0 16 16"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/></svg></span>
        <input type="text" placeholder="検索…" id="mobile-search" />
      </div>

      <div class="sidebar-section">
        <div class="nav-item active" data-filter="all" data-label="すべて">
          <span class="nav-icon"><svg width="15" height="15" viewBox="0 0 16 16"><path d="M1 2.5A1.5 1.5 0 0 1 2.5 1h3A1.5 1.5 0 0 1 7 2.5v3A1.5 1.5 0 0 1 5.5 7h-3A1.5 1.5 0 0 1 1 5.5zm8 0A1.5 1.5 0 0 1 10.5 1h3A1.5 1.5 0 0 1 15 2.5v3A1.5 1.5 0 0 1 13.5 7h-3A1.5 1.5 0 0 1 9 5.5zm-8 8A1.5 1.5 0 0 1 2.5 9h3A1.5 1.5 0 0 1 7 10.5v3A1.5 1.5 0 0 1 5.5 15h-3A1.5 1.5 0 0 1 1 13.5zm8 0A1.5 1.5 0 0 1 10.5 9h3A1.5 1.5 0 0 1 15 10.5v3A1.5 1.5 0 0 1 13.5 15h-3A1.5 1.5 0 0 1 9 13.5z"/></svg></span>
          すべて <span class="nav-count">12</span>
        </div>
        <div class="nav-item" data-filter="unsorted" data-label="未分類">
          <span class="nav-icon"><svg width="15" height="15" viewBox="0 0 16 16"><path d="M9.828.722a.5.5 0 0 1 .354.146l4.95 4.95a.5.5 0 0 1 0 .707c-.48.48-1.072.588-1.503.588-.177 0-.335-.018-.46-.039l-3.134 3.134a6 6 0 0 1 .16 1.013c.046.702-.032 1.687-.72 2.375a.5.5 0 0 1-.707 0l-2.829-2.828-3.182 3.182c-.195.195-1.219.902-1.414.707s.512-1.22.707-1.414l3.182-3.182-2.828-2.829a.5.5 0 0 1 0-.707c.688-.688 1.673-.767 2.375-.72a6 6 0 0 1 1.013.16l3.134-3.133a3 3 0 0 1-.04-.461c0-.43.108-1.022.589-1.503a.5.5 0 0 1 .353-.146"/></svg></span>
          未分類 <span class="nav-count">4</span>
        </div>
      </div>

      <div class="sidebar-divider"></div>

      <div class="sidebar-section">
        <div class="section-label">
          Collections
          <button class="section-label-btn"><svg width="11" height="11" viewBox="0 0 16 16"><path d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2"/></svg></button>
        </div>
        <div class="nav-item" data-filter="col-history" data-label="近現代史">
          <span class="col-dot" style="background:#e05c5c"></span>近現代史<span class="nav-count">4</span>
        </div>
        <div class="nav-item" data-filter="col-geo" data-label="地理・地政学">
          <span class="col-dot" style="background:#38a169"></span>地理・地政学<span class="nav-count">3</span>
        </div>
        <div class="nav-item" data-filter="col-science" data-label="科学・技術">
          <span class="col-dot" style="background:#d97706"></span>科学・技術<span class="nav-count">2</span>
        </div>
        <div class="nav-item" data-filter="col-politics" data-label="政治・国際">
          <span class="col-dot" style="background:#7c3aed"></span>政治・国際<span class="nav-count">3</span>
        </div>
      </div>

      <div class="sidebar-divider"></div>

      <div class="sidebar-section">
        <div class="section-label">Tags</div>
        <div class="nav-item" data-filter="tag-wwii" data-label="#第二次世界大戦">
          <span class="nav-hash">#</span>第二次世界大戦<span class="nav-count">3</span>
        </div>
        <div class="nav-item" data-filter="tag-europe" data-label="#ヨーロッパ">
          <span class="nav-hash">#</span>ヨーロッパ<span class="nav-count">5</span>
        </div>
        <div class="nav-item" data-filter="tag-economics" data-label="#経済史">
          <span class="nav-hash">#</span>経済史<span class="nav-count">2</span>
        </div>

    </nav>

    <!-- Main panel -->
    <div class="main" id="main-panel">
      <div class="main-topbar">
        <button class="back-btn" id="back-btn">
          <svg width="16" height="16" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M11.354 1.646a.5.5 0 0 1 0 .708L5.707 8l5.647 5.646a.5.5 0 0 1-.708.708l-6-6a.5.5 0 0 1 0-.708l6-6a.5.5 0 0 1 .708 0"/></svg>
        </button>
        <div class="main-title-row">
          <span class="main-title" id="main-title">すべて</span>
          <span class="count-badge" id="main-count">12件</span>
        </div>
        <div class="main-actions">
          <button class="btn-icon" title="並び替え">
            <svg width="15" height="15" viewBox="0 0 16 16"><path d="M3.5 2.5a.5.5 0 0 0-1 0v8.793l-1.146-1.147a.5.5 0 0 0-.708.708l2 1.999.007.007a.497.497 0 0 0 .7-.006l2-2a.5.5 0 0 0-.707-.708L3.5 11.293zm3.5 1a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7a.5.5 0 0 1-.5-.5M7.5 6a.5.5 0 0 0 0 1h5a.5.5 0 0 0 0-1zm0 3a.5.5 0 0 0 0 1h3a.5.5 0 0 0 0-1zm0 3a.5.5 0 0 0 0 1h1a.5.5 0 0 0 0-1z"/></svg>
          </button>
          <button class="btn-icon" id="add-btn-main" title="追加">
            <svg width="16" height="16" viewBox="0 0 16 16"><path d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2"/></svg>
          </button>
          <button class="btn-icon" title="その他">
            <svg width="15" height="15" viewBox="0 0 16 16"><path d="M3 9.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3m5 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3m5 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3"/></svg>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2>記事を追加</h2>
      <button class="btn-icon" id="modal-close"><svg width="15" height="15" viewBox="0 0 16 16"><path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Wikipedia URL または記事タイトル</label>
        <input class="form-input" type="text" id="url-input" placeholder="https://ja.wikipedia.org/wiki/… または「ワイマール共和国」" />
      </div>
      <div class="preview-block" id="preview-block" style="display:none;">
        <div class="preview-thumb">📖</div>
        <div>
          <div class="preview-title" id="preview-title"></div>
          <div class="preview-desc" id="preview-desc"></div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">コレクション</label>
        <select class="form-input" id="col-select">
          <option value="">未分類</option>
          <option value="col-history">近現代史</option>
          <option value="col-geo">地理・地政学</option>
          <option value="col-science">科学・技術</option>
          <option value="col-politics">政治・国際</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" id="cancel-btn">キャンセル</button>
      <button class="btn-primary" id="save-btn">保存する</button>
    </div>
  </div>
</div>

<script>
const ARTICLES = [
  {id:1,title:"ワイマール共和国",summary:"1919年から1933年までのドイツの共和制国家。世界恐慌や政治的混乱を経てナチズムの台頭により崩壊した。",collection:"col-history",tags:["第二次世界大戦","ヨーロッパ","経済史"],saved:"Apr 22",emoji:"🏛️"},
  {id:2,title:"ヴェルサイユ条約",summary:"第一次世界大戦を終結させた1919年の講和条約。ドイツへの賠償条項がその後の混乱の一因となった。",collection:"col-history",tags:["第二次世界大戦","ヨーロッパ"],saved:"Apr 21",emoji:"📜"},
  {id:3,title:"ライン川",summary:"アルプスを源流とし北海に注ぐ全長1,230kmの河川。中世より西ヨーロッパ交易の動脈として機能してきた。",collection:"col-geo",tags:["ヨーロッパ"],saved:"Apr 20",emoji:"🌊"},
  {id:4,title:"大恐慌",summary:"1929年のニューヨーク株式市場崩壊に端を発した世界規模の経済危機。各国の失業率が急増した。",collection:"col-history",tags:["経済史"],saved:"Apr 19",emoji:"📉"},
  {id:5,title:"マンハッタン計画",summary:"第二次世界大戦中のアメリカ主導の核兵器開発プロジェクト。1945年に世界初の核実験に成功した。",collection:"col-science",tags:["第二次世界大戦"],saved:"Apr 18",emoji:"⚛️"},
  {id:6,title:"スエズ運河",summary:"地中海と紅海を結ぶエジプトの人工水路。1869年開通。ヨーロッパ〜アジア間の海路を大幅短縮した。",collection:"col-geo",tags:["ヨーロッパ"],saved:"Apr 17",emoji:"⚓"},
  {id:7,title:"アドルフ・ヒトラー",summary:"ナチス・ドイツの指導者。1933年首相就任後に独裁体制を確立、第二次世界大戦とホロコーストを引き起こした。",collection:"col-history",tags:["第二次世界大戦","ヨーロッパ"],saved:"Apr 16",emoji:"📕"},
  {id:8,title:"チューリング・マシン",summary:"アラン・チューリングが1936年に提唱した計算モデル。現代コンピュータ科学の理論的基礎をなす。",collection:"col-science",tags:[],saved:"Apr 15",emoji:"💡"},
  {id:9,title:"アパルトヘイト",summary:"1948〜1991年に南アフリカで実施された人種隔離政策。国際制裁を受け1994年に完全廃止された。",collection:"col-politics",tags:[],saved:"Apr 14",emoji:"⚖️"},
  {id:10,title:"モンスーン",summary:"季節によって方向が変わる卓越風。アジア・西アフリカなど熱帯地域の農業・気候に決定的な影響を与える。",collection:"col-geo",tags:[],saved:"Apr 13",emoji:"🌧️"},
  {id:11,title:"プラザ合意",summary:"1985年のG5による為替調整合意。ドル高是正を目的とし、日本の円高・バブル経済の遠因となった。",collection:"col-politics",tags:["経済史"],saved:"Apr 12",emoji:"💴"},
  {id:12,title:"シルクロード",summary:"古代〜中世に中国とローマを結んだ交易路の総称。絹・香辛料・宗教・文化が東西間を行き来した。",collection:"col-politics",tags:["ヨーロッパ"],saved:"Apr 11",emoji:"🐪"},
];

let activeFilter = "all";
let activeLabel  = "すべて";
const isMobile   = () => window.innerWidth < 700;

function getFiltered(q = "") {
  let list = ARTICLES;
  if (activeFilter === "unsorted")         list = list.filter(a => !a.collection);
  else if (activeFilter.startsWith("col-")) list = list.filter(a => a.collection === activeFilter);
  else if (activeFilter.startsWith("tag-")) {
    const map = {"tag-wwii":"第二次世界大戦","tag-europe":"ヨーロッパ","tag-economics":"経済史"};
    list = list.filter(a => a.tags.includes(map[activeFilter]));
  }
  if (q) list = list.filter(a => a.title.includes(q) || a.summary.includes(q));
  return list;
}

function render(q = "") {
  const articles = getFiltered(q);
  document.getElementById("main-title").textContent = activeLabel;
  document.getElementById("main-count").textContent = articles.length + "件";
  const el = document.getElementById("article-list");

  if (!articles.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📂</div><p>まだ記事がありません</p><button class="btn-primary" style="margin-top:6px;" onclick="openModal()"><svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2"/></svg> 追加する</button></div>`;
    return;
  }

  el.innerHTML = articles.map(a => `
    <div class="list-item">
      <div class="item-thumb">${a.emoji}</div>
      <div class="item-info">
        <div class="item-title">${a.title}</div>
        <div class="item-meta">
          <span>ja.wikipedia.org</span><span>·</span><span>${a.saved}</span>
        </div>
        ${a.tags.length ? `<div class="item-tags">${a.tags.slice(0,2).map(t=>`<span class="tag-pill">${t}</span>`).join("")}</div>` : ""}
      </div>
      <div class="item-actions">
        <button class="btn-icon" title="開く"><svg width="13" height="13" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M8.636 3.5a.5.5 0 0 0-.5-.5H1.5A1.5 1.5 0 0 0 0 4.5v10A1.5 1.5 0 0 0 1.5 16h10a1.5 1.5 0 0 0 1.5-1.5V7.864a.5.5 0 0 0-1 0V14.5a.5.5 0 0 1-.5.5h-10a.5.5 0 0 1-.5-.5v-10a.5.5 0 0 1 .5-.5h6.636a.5.5 0 0 0 .5-.5"/><path fill-rule="evenodd" d="M16 .5a.5.5 0 0 0-.5-.5h-5a.5.5 0 0 0 0 1h3.793L6.146 9.146a.5.5 0 1 0 .708.708L15 1.707V5.5a.5.5 0 0 0 1 0z"/></svg></button>
        <button class="btn-icon" title="削除"><svg width="13" height="13" viewBox="0 0 16 16"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"/><path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z"/></svg></button>
      </div>
    </div>`).join("");
}

// Nav
document.querySelectorAll(".nav-item").forEach(el => {
  el.addEventListener("click", () => {
    activeFilter = el.dataset.filter;
    activeLabel  = el.dataset.label || "すべて";
    document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
    el.classList.add("active");
    render();
    if (isMobile()) document.getElementById("main-panel").classList.add("visible");
  });
});

document.getElementById("back-btn").addEventListener("click", () => {
  document.getElementById("main-panel").classList.remove("visible");
});

["desktop-search","mobile-search"].forEach(id => {
  document.getElementById(id)?.addEventListener("input", e => render(e.target.value.trim()));
});

// Modal
function openModal() {
  document.getElementById("modal-overlay").classList.add("open");
  setTimeout(() => document.getElementById("url-input").focus(), 50);
}
function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
  document.getElementById("url-input").value = "";
  document.getElementById("preview-block").style.display = "none";
}
document.getElementById("add-btn").addEventListener("click", openModal);
document.getElementById("add-btn-main").addEventListener("click", openModal);
document.getElementById("modal-close").addEventListener("click", closeModal);
document.getElementById("cancel-btn").addEventListener("click", closeModal);
document.getElementById("modal-overlay").addEventListener("click", e => { if(e.target===e.currentTarget) closeModal(); });

let pt;
document.getElementById("url-input").addEventListener("input", e => {
  clearTimeout(pt);
  const v = e.target.value.trim();
  if(!v){document.getElementById("preview-block").style.display="none";return;}
  pt = setTimeout(()=>{
    const title = v.includes("/wiki/") ? decodeURIComponent(v.split("/wiki/")[1]?.replace(/_/g," ")||v) : v;
    document.getElementById("preview-title").textContent = title;
    document.getElementById("preview-desc").textContent = "Wikipedia APIから要約を取得中…";
    document.getElementById("preview-block").style.display = "flex";
  }, 380);
});
document.getElementById("save-btn").addEventListener("click", () => {
  if(!document.getElementById("url-input").value.trim()) return;
  closeModal();
});

// Init
render();
if(!isMobile()) document.getElementById("main-panel").classList.add("visible");
window.addEventListener("resize", ()=>{ if(!isMobile()) document.getElementById("main-panel").classList.add("visible"); });
</script>
</body>
</html>
